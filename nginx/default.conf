server {
    listen 80;

    # Khi khách hàng gọi đường dẫn bắt đầu bằng /api/products
    location /api/products {
        # Cô tiếp tân (Nginx) sẽ forward yêu cầu sang Product Service
        proxy_pass http://product-api:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Khi khách hàng gọi đường dẫn bắt đầu bằng /api/orders
    location /api/orders {
        # Cô tiếp tân sẽ forward yêu cầu sang Order Service
        proxy_pass http://order-api:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Nếu gọi đường dẫn không tồn tại
    location / {
        return 404 '{"message": "API Not Found. Vui long goi /api/products hoac /api/orders"}';
        default_type application/json;
    }
}