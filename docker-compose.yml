version: '3.8'

services:
  # 1. Database MySQL dùng chung
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    networks:
      - micro-network

  # 2. Message Broker Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - micro-network

  # 3. Product Service (API)
  product-api:
    build:
      context: ./coffee-product-service
    ports:
      - "8001:8001"
    volumes:
      - ./coffee-product-service:/app
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=root
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8001
    networks:
      - micro-network

  # 4. Product Service (Worker lắng nghe Kafka)
  product-worker:
    build:
      context: ./coffee-product-service
    volumes:
      - ./coffee-product-service:/app
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - redis
      - mysql
      - kafka 
    command: php artisan kafka:listen-orders 
    networks:
      - micro-network
    restart: always

  # 5. Order Service (API)
  order-api:
    build:
      context: ./coffee-order-service
    ports:
      - "8002:8002"
    volumes:
      - ./coffee-order-service:/app
    environment:
      - DB_HOST=mysql
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
      - PRODUCT_SERVICE_URL=http://product-api:8001 
    depends_on:
      - mysql
      - kafka
    command: php artisan serve --host=0.0.0.0 --port=8002
    networks:
      - micro-network
      
  # 6. API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - product-api
      - order-api
    networks:
      - micro-network
      
  # 7. Zookeeper (Bản chuẩn của Confluent)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - micro-network

  # 8. Kafka (Bản chuẩn của Confluent)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - micro-network

# Định nghĩa mạng nội bộ và volume lưu dữ liệu
networks:
  micro-network:
    driver: bridge

volumes:
  mysql_data: